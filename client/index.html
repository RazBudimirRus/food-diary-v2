<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Title & description ── -->
    <title>Дневник питания</title>
    <meta name="description" content="Личный дневник питания — ведение записей и отчёт для врача" />
    <meta name="application-name" content="Дневник питания" />

    <!-- ── Favicons ── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3d6b52" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2a4a3a" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodDiary" />

    <!-- ── Open Graph (og:image = V1 — самый запоминающийся) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Дневник питания" />
    <meta property="og:description" content="Личный дневник питания — ведение записей и отчёт для врача" />
    <meta property="og:image" content="/logo-v1.png" />

    <!-- ── Dark mode init (no flash) ── -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('food-diary-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
