version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: food_diary_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TRUST_PROXY: "1"
    volumes:
      - data_db:/app/data
    expose:
      - "5000"
    networks:
      - food_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/now"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: food_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/ssl/razbudimir:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - food_net
    depends_on:
      api:
        condition: service_healthy

networks:
  food_net:
    driver: bridge

volumes:
  data_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/foodbot/data
  caddy_data:
  caddy_config:
  caddy_logs:
